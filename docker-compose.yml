networks:
  airsight-network:
    driver: bridge

volumes:
  hadoop_namenode:
  hadoop_datanode1:
  hadoop_datanode2:
  redis_data:
  ml_models:

services:

  # ─── ZOOKEEPER ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    networks:
      - airsight-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── KAFKA BROKERS ────────────────────────────────────────
  kafka1:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka1
    networks:
      - airsight-network
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka2:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka2
    networks:
      - airsight-network
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9093"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka3:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka3
    networks:
      - airsight-network
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9094"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── KAFKA UI ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - airsight-network
    depends_on:
      - kafka1
      - kafka2
      - kafka3
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: airsight-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:9092,kafka2:9093,kafka3:9094
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # ─── HDFS NAMENODE ────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    networks:
      - airsight-network
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    environment:
      CLUSTER_NAME: airsight-hadoop
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      CORE_CONF_hadoop_http_staticuser_user: root
      HDFS_CONF_dfs_replication: 2
      HDFS_CONF_dfs_webhdfs_enabled: 'true'
      HDFS_CONF_dfs_permissions_enabled: 'false'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870/"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── HDFS DATANODES ───────────────────────────────────────
  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode1
    networks:
      - airsight-network
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - hadoop_datanode1:/hadoop/dfs/data
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: 2
      HDFS_CONF_dfs_webhdfs_enabled: 'true'
      HDFS_CONF_dfs_permissions_enabled: 'false'
      SERVICE_PRECONDITION: "namenode:9870"

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode2
    networks:
      - airsight-network
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - hadoop_datanode2:/hadoop/dfs/data
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: 2
      HDFS_CONF_dfs_webhdfs_enabled: 'true'
      HDFS_CONF_dfs_permissions_enabled: 'false'
      SERVICE_PRECONDITION: "namenode:9870"

  # ─── SPARK ────────────────────────────────────────────────
  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-master
    networks:
      - airsight-network
    depends_on:
      namenode:
        condition: service_healthy
    ports:
      - "8181:8080"
      - "7077:7077"
      - "6066:6066"
    volumes:
      - ./spark/jobs:/opt/spark-jobs
    environment:
      INIT_DAEMON_STEP: setup_spark
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 15s
      timeout: 10s
      retries: 5

  spark-worker1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker1
    networks:
      - airsight-network
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - ./spark/jobs:/opt/spark-jobs
    environment:
      SPARK_MASTER: spark://spark-master:7077
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g

  spark-worker2:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker2
    networks:
      - airsight-network
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8082:8082"
    volumes:
      - ./spark/jobs:/opt/spark-jobs
    environment:
      SPARK_MASTER: spark://spark-master:7077
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g

  # ─── REDIS ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    networks:
      - airsight-network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── KAFKA INIT (create topics) ───────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-init
    networks:
      - airsight-network
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    volumes:
      - ./scripts/init_kafka_topics.sh:/init_kafka_topics.sh
    command: ["bash", "/init_kafka_topics.sh"]
    restart: on-failure

  # ─── HDFS INIT (create directories) ───────────────────────
  hdfs-init:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-init
    networks:
      - airsight-network
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    volumes:
      - ./scripts/init_hdfs_dirs.sh:/init_hdfs_dirs.sh
    command: ["bash", "/init_hdfs_dirs.sh"]
    restart: on-failure

  # ─── KAFKA PRODUCERS ──────────────────────────────────────
  producer-aqi:
    build:
      context: ./kafka/producers
      dockerfile: Dockerfile
    container_name: producer-aqi
    networks:
      - airsight-network
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    command: ["python", "aqi_producer.py"]
    restart: unless-stopped

  producer-weather:
    build:
      context: ./kafka/producers
      dockerfile: Dockerfile
    container_name: producer-weather
    networks:
      - airsight-network
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    command: ["python", "weather_producer.py"]
    restart: unless-stopped

  producer-uv:
    build:
      context: ./kafka/producers
      dockerfile: Dockerfile
    container_name: producer-uv
    networks:
      - airsight-network
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    command: ["python", "uv_producer.py"]
    restart: unless-stopped

  producer-traffic:
    build:
      context: ./kafka/producers
      dockerfile: Dockerfile
    container_name: producer-traffic
    networks:
      - airsight-network
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    command: ["python", "traffic_producer.py"]
    restart: unless-stopped

  producer-openaq:
    build:
      context: ./kafka/producers
      dockerfile: Dockerfile
    container_name: producer-openaq
    networks:
      - airsight-network
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    command: ["python", "openaq_producer.py"]
    restart: unless-stopped

  producer-openmeteo:
    build:
      context: ./kafka/producers
      dockerfile: Dockerfile
    container_name: producer-openmeteo
    networks:
      - airsight-network
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    command: ["python", "openmeteo_producer.py"]
    restart: unless-stopped

  # ─── HDFS CONSUMER ────────────────────────────────────────
  hdfs-consumer:
    build:
      context: ./kafka/consumers
      dockerfile: Dockerfile
    container_name: hdfs-consumer
    networks:
      - airsight-network
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      namenode:
        condition: service_healthy
    env_file: .env
    command: ["python", "hdfs_consumer.py"]
    restart: unless-stopped

  # ─── ML INFERENCE ─────────────────────────────────────────
  ml-inference:
    build:
      context: ./ml/inference
      dockerfile: Dockerfile
    container_name: ml-inference
    networks:
      - airsight-network
    ports:
      - "8001:8001"
    volumes:
      - ml_models:/app/models
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── ML TRAINER (run-once, profile: training) ─────────────
  # Fetches historical data from Open-Meteo and trains the AQI model into the
  # shared ml_models volume. Not started by default.
  #   docker compose --profile training run --rm ml-trainer
  ml-trainer:
    build:
      context: ./ml/training
      dockerfile: Dockerfile
    container_name: ml-trainer
    profiles: ["training"]
    networks:
      - airsight-network
    volumes:
      - ml_models:/app/models
    env_file: .env
    restart: "no"

  # ─── BACKEND (FastAPI) ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    networks:
      - airsight-network
    depends_on:
      redis:
        condition: service_healthy
      ml-inference:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── FRONTEND (Next.js) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    networks:
      - airsight-network
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    restart: unless-stopped

  # ─── SCHEDULER ────────────────────────────────────────────
  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: scheduler
    networks:
      - airsight-network
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      namenode:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env
    restart: unless-stopped
